name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout forbids `path:` escaping $GITHUB_WORKSPACE via `../`,
      # so every repo (this one included) checks out as a DIRECT CHILD of
      # $GITHUB_WORKSPACE — matching the sibling layout deps.edn's
      # :local/root ("../bim" etc., relative to THIS repo's own checkout)
      # needs, since $GITHUB_WORKSPACE/kami-app-amenominaka/../bim ==
      # $GITHUB_WORKSPACE/bim (ADR-2607100100 M0/M1/M2).
      - uses: actions/checkout@v4
        with: {path: kami-app-amenominaka}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/bim, path: bim}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-atmosphere-scene, path: kami-atmosphere-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-vegetation-scene, path: kami-vegetation-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-terrain-scene, path: kami-terrain-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-postfx-scene, path: kami-postfx-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/org-openusd, path: org-openusd}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/materialx, path: materialx}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/webgpu, path: webgpu}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/atmosphere, path: atmosphere}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/org-w3-webgpu, path: org-w3-webgpu}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/expr, path: expr}
      # M5 (ADR-2607100100): the org's default UI/UX design system
      # (ADR-2607022800) — appkit's own deps.edn resolves kotoba-ui via
      # :local/root "../kotoba-ui", which in turn resolves shitsuke +
      # liquid-glass-ui the same way, so all three need sibling checkouts
      # too (liquid-glass-ui's own `css` dep is a :git/sha coordinate,
      # resolved by tools.deps itself — no checkout needed for it here).
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/appkit, path: appkit}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kotoba-ui, path: kotoba-ui}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/shitsuke, path: shitsuke}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/liquid-glass-ui, path: liquid-glass-ui}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/html, path: html}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/css, path: css}
      # M7 (ADR-2607100100): glTF export.
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/org-khronos-gltf, path: org-khronos-gltf}
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test
        working-directory: kami-app-amenominaka

  # M2 (ADR-2607100100): real-browser WebGPU verification. macOS runner —
  # ADR-2607078000 Addendum 8 found Linux/SwiftShader WebGPU unreliable
  # (blank canvases, popErrorScope errors), macOS reliable (real
  # Metal-backed GPU process, no special launch flags needed).
  webgpu-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: {path: kami-app-amenominaka}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/bim, path: bim}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-atmosphere-scene, path: kami-atmosphere-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-vegetation-scene, path: kami-vegetation-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-terrain-scene, path: kami-terrain-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kami-postfx-scene, path: kami-postfx-scene}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/org-openusd, path: org-openusd}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/materialx, path: materialx}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/webgpu, path: webgpu}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/atmosphere, path: atmosphere}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/org-w3-webgpu, path: org-w3-webgpu}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/expr, path: expr}
      # M5 (ADR-2607100100): see the `test` job above for why appkit/
      # kotoba-ui/shitsuke/liquid-glass-ui need sibling checkouts here too
      # (clojure -M:cljs resolves the same :local/root chain). `css` is
      # additionally needed here (unlike the `test` job) because bb.edn's
      # `:paths` resolves it as a local sibling for babashka's `bb ui-css`
      # task — babashka doesn't do tools.deps git-coordinate resolution.
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/appkit, path: appkit}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/kotoba-ui, path: kotoba-ui}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/shitsuke, path: shitsuke}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/liquid-glass-ui, path: liquid-glass-ui}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/html, path: html}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/css, path: css}
      # M7 (ADR-2607100100): glTF export. org-khronos-glb is org-khronos-gltf's
      # OWN :git/sha dep (tools.deps resolves it for `clojure -M:test` above),
      # but nbb needs an explicit -cp entry pointing at a real checkout — see
      # test/render/verify_m7_gltf.cljs's docstring.
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/org-khronos-gltf, path: org-khronos-gltf}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/org-khronos-glb, path: org-khronos-glb}
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: kami-app-amenominaka
      - run: npx playwright install chromium
        working-directory: kami-app-amenominaka
      - run: npx shadow-cljs compile m2-demo
        working-directory: kami-app-amenominaka
      - run: npx nbb -cp test/render test/render/verify_m2_render.cljs
        working-directory: kami-app-amenominaka
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m2-render-screenshot
          path: kami-app-amenominaka/test/render/m2-render-screenshot.png
          if-no-files-found: ignore
      # M4 (ADR-2607100100 D6-b): perf-regression guard, not just a
      # one-time investigation — fails if instance-buffer caching in
      # kotoba-lang/webgpu's draw! regresses back to O(instance count)
      # per-frame cost (see test/render/verify_m4_stress.cljs).
      - run: npx shadow-cljs compile m4-stress-demo
        working-directory: kami-app-amenominaka
      - run: npx nbb -cp test/render test/render/verify_m4_stress.cljs
        working-directory: kami-app-amenominaka
      # M5 (ADR-2607100100): interactive UI shell real-browser verification
      # (see test/render/verify_m5_ui.cljs docstring).
      - run: bb ui-css
        working-directory: kami-app-amenominaka
      - run: npx shadow-cljs compile shell
        working-directory: kami-app-amenominaka
      - run: npx nbb -cp test/render test/render/verify_m5_ui.cljs
        working-directory: kami-app-amenominaka
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m5-ui-screenshot
          path: kami-app-amenominaka/test/render/m5-ui-screenshot.png
          if-no-files-found: ignore
      # M7 (ADR-2607100100): glTF export real-browser verification — clicks
      # the real "Export glTF" button, captures the real download, parses it
      # with org-khronos-gltf's own parser (see verify_m7_gltf.cljs docstring).
      - run: npx nbb -cp "test/render:../org-khronos-gltf/src:../org-khronos-glb/src" test/render/verify_m7_gltf.cljs
        working-directory: kami-app-amenominaka
      # M8 (ADR-2607100100): fly-camera real-browser verification — toggles
      # camera mode, holds a real 'w' keydown, confirms real movement + a
      # changed rendered frame (see test/render/verify_m8_fly_camera.cljs).
      - run: npx nbb -cp test/render test/render/verify_m8_fly_camera.cljs
        working-directory: kami-app-amenominaka
      # M9 (ADR-2607100100): omni.timeline (camera-path) real-browser
      # verification — records real keyframes, scrubs, plays back over
      # real wall-clock time (see test/render/verify_m9_timeline.cljs).
      - run: npx nbb -cp test/render test/render/verify_m9_timeline.cljs
        working-directory: kami-app-amenominaka
