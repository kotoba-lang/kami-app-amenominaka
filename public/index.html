<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Amenominaka semantic WebGPU scene editor">
  <title>Amenominaka · Scene Editor</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="vendor/kotoba-ui.css">
  <style>
    html, body, #app { width: 100%; height: 100%; margin: 0; }
    #app:empty::before { content: "Loading Amenominaka…"; color: #8e8e93; }
    .am-scene-editor input { width: 100%; box-sizing: border-box; margin-bottom: .5rem; }
    #scene-tree { display: grid; gap: .25rem; max-height: 12rem; overflow: auto; }
    #scene-tree .selected { outline: 2px solid #79a7ff; }
    .am-scene-actions { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: .35rem; margin-block: .5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="js/shell.js"></script>
</body>
</html>
